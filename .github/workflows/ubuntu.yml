name: ubuntu

on:
  push:
    branches: [main]
    paths:
      - "Sources/**"
      - "Tests/**"
      - "Package.swift"
      - ".github/workflows/ubuntu.yml"
  pull_request:
    branches: [main]
    paths:
      - "Sources/**"
      - "Tests/**"
      - "Package.swift"
      - ".github/workflows/ubuntu.yml"

concurrency:
  group: ubuntu-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ubuntu:
    runs-on: ubuntu-latest
    container: swift:6.0
    timeout-minutes: 30
    steps:
    - uses: actions/checkout@v5
    - name: Build
      run: swift build -v
    - name: Run tests
      run: swift test -v
